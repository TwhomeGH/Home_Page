# GitHub Actions workflow for building and deploying to GitHub Pages
name: Build and Deploy to GitHub Pages

on:
  # 每週定时运行（UTC时间+8点，台北时间凌晨0點）
  schedule:
    - cron: '0 16 * * 0'
  # 允许手动触发
  workflow_dispatch:
  # 当推送到主分支时触发
  push:
    branches: ['main', 'master']

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：允许同时进行一个部署，不取消进行中的运行
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. 检出代码库
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
